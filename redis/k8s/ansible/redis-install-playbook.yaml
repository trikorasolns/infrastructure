---
- name: "Install Redis"
  hosts: "{{ k8s_host | default(ocp_bastion) | default('ocp_bastion') | default('localhost') }}"
  gather_facts: "{{ gathering_host_info | default('true') | bool == true }}"

  pre_tasks:
    - name: "Validate app_namespace"
      ansible.builtin.assert:
        that:
          - "app_namespace is defined"
        fail_msg: "app_namespace must be defined"
        success_msg: "Deploying into {{ app_namespace }} namespace"

  tasks:

    - name: "Copy values file"
      ansible.builtin.copy:
        src: 'files/helm-redis-values.yaml'
        dest: '/tmp/helm-redis-values.yaml'
        mode: '0644'

    - name: "Deploy Redis using Helm"
      kubernetes.core.helm:
        name: redis
        chart_ref: "{% if trikora_helm_project_dir is defined %}{{ trikora_helm_project_dir }}/charts/redis{% else %}trikorasolns/redis{% endif %}"
        release_namespace: "{{ app_namespace }}"
        wait: true
        # replace: false
        values_files:
          - "/tmp/helm-redis-values.yaml"

    - name: "Delete values file"
      ansible.builtin.file:
        path: '/tmp/helm-redis-values.yaml'
        state: 'absent'
...
