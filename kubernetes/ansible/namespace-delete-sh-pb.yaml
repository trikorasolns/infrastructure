---
- name: "Delete Namespace using shell"
  hosts: "{{ k8s_host | ocp_bastion | default('ocp_bastion') | default('localhost') }}"
  gather_facts: "{{ gathering_host_info | default('true') | bool == true }}"

  tasks:
    - name: "Delete the namespace - {{ app_namespace }}"
      ansible.builtin.shell: |
        kubectl delete namespace {{ app_namespace }}
      register: delete_namespace_res
      changed_when: delete_namespace_res.rc == 0
      failed_when: delete_namespace_res.rc != 0 and 'not found' not in delete_namespace_res.stderr
...
