---

- name: Create namespace
  import_playbook: ../../../kubernetes/ansible/create-namespace-playbook.yaml

- name: Install database
  import_playbook: ../../pgsql/podman/ansible/podman-install-playbook.yaml
  vars: 
    db_user: "{{ db_name }}"
    db_password: "{{ db_pw | default(db_name) }}"

- name: "Install Apache Superset - {{ app_version }}"
  hosts: "{{ k8s_host | default('localhost') }}"
  gather_facts: "{{ gathering_host_info | default('true') | bool == true }}"

  pre_tasks:
    - name: "Validate variables"
      assert:
        that:
          # - "pv_root_folder is defined"
          - "app_name is defined"
          - "app_namespace is defined"
        fail_msg: "Missing required parameters"

  tasks:

    # - name: "Create superset secret"
    #   kubernetes.core.k8s_info:
    #     api_version: v1
    #     kind: Secret
    #     name: postgresql
    #     namespace: "{{ app_namespace }}"
    #   register: postgresql_secret_info

    - name: "Template Odoo deployment files"
      ansible.builtin.template:
        src: "superset-secret.yaml.j2"
        dest: "/tmp/superset-secret.yaml"
        mode: '0600'

    - name: "Deploy Odoo with Helm"
      kubernetes.core.helm:
        name: "apache-superset"
        chart_ref: "superset/superset"
        release_namespace: "{{ app_namespace }}"
        wait: true
        replace: true
        values_files:
          - /tmp/helm-odoo-odoo-values.yaml
      register: odoo_helm_res 
...
